  <style>
    /* ===== Treasure Box Page Styles ===== */

    :root {
      --tb-accent: #49b1f5;
      --tb-accent2: #ff7242;
    }

    /* --- Particles --- */
    .tb-particles {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .tb-particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: tbFloat linear infinite;
    }
    @keyframes tbFloat {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      15%  { opacity: 0.5; transform: translateY(80vh) scale(1); }
      85%  { opacity: 0.5; }
      100% { transform: translateY(-5vh) scale(0.5); opacity: 0; }
    }

    /* --- Nav --- */
    #nav {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 30px; z-index: 100;
      background: transparent; transition: all 0.4s ease;
    }
    #nav.scrolled {
      background: var(--card-bg);
      box-shadow: 0 2px 20px rgba(0,0,0,0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .nav-back {
      display: flex; align-items: center; gap: 8px;
      color: var(--font-color); text-decoration: none;
      font-size: 0.9rem; transition: color 0.3s;
    }
    .nav-back:hover { color: var(--link-color); }
    .nav-site-title {
      font-size: 1.1rem; font-weight: 700;
      color: var(--text-highlight-color); text-decoration: none;
    }

    /* --- Hero --- */
    .tb-hero {
      min-height: 50vh;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      position: relative; overflow: hidden;
      padding-top: 60px;
    }
    .tb-hero::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, rgba(73,177,245,0.07), rgba(255,114,66,0.05));
      z-index: 0;
    }
    .tb-hero-glow {
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.12;
      animation: glowPulse 8s ease-in-out infinite alternate;
    }
    .tb-hero-glow-1 { top: -80px; left: -80px; background: var(--tb-accent); }
    .tb-hero-glow-2 { bottom: -80px; right: -80px; background: var(--tb-accent2); animation-delay: 4s; }
    @keyframes glowPulse {
      0% { transform: scale(1); opacity: 0.1; }
      100% { transform: scale(1.3); opacity: 0.18; }
    }
    .tb-hero-content {
      position: relative; z-index: 1;
      text-align: center; padding: 0 20px;
    }
    .tb-hero-icon {
      font-size: 3.5rem;
      margin-bottom: 16px;
      animation: chestBounce 2s ease-in-out infinite;
      display: inline-block;
    }
    @keyframes chestBounce {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-10px) rotate(-3deg); }
      75% { transform: translateY(-5px) rotate(3deg); }
    }
    .tb-hero h1 {
      font-size: 2.5rem; font-weight: 800;
      background: linear-gradient(135deg, var(--tb-accent), var(--tb-accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .tb-hero p {
      color: var(--dark-grey);
      font-size: 1rem;
      margin-bottom: 20px;
    }
    .tb-stats {
      display: flex; gap: 24px; justify-content: center; flex-wrap: wrap;
    }
    .tb-stat {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 10px 20px;
      box-shadow: var(--shadow-card);
      transition: all 0.3s ease;
    }
    .tb-stat:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
    .tb-stat-num {
      font-size: 1.5rem; font-weight: 800;
      background: linear-gradient(135deg, var(--tb-accent), var(--tb-accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tb-stat-label { font-size: 0.78rem; color: var(--dark-grey); }

    /* --- Search --- */
    .tb-search-wrap {
      max-width: 500px; margin: 30px auto 0;
      position: relative;
    }
    .tb-search {
      width: 100%; padding: 12px 20px 12px 44px;
      border: 2px solid var(--border-color);
      border-radius: 30px;
      background: var(--card-bg);
      color: var(--font-color);
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s ease;
    }
    .tb-search:focus {
      border-color: var(--tb-accent);
      box-shadow: 0 0 20px rgba(73,177,245,0.15);
    }
    .tb-search-icon {
      position: absolute; left: 16px; top: 50%;
      transform: translateY(-50%);
      color: var(--dark-grey);
      font-size: 0.95rem;
    }

    /* --- Category Tabs --- */
    .tb-tabs {
      display: flex; gap: 10px; justify-content: center;
      flex-wrap: wrap;
      max-width: 900px; margin: 40px auto 30px;
      padding: 0 20px;
      position: relative; z-index: 1;
    }
    .tb-tab {
      padding: 8px 18px;
      border-radius: 20px;
      border: 1.5px solid var(--border-color);
      background: var(--card-bg);
      color: var(--font-color);
      font-size: 0.85rem; font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      user-select: none;
    }
    .tb-tab:hover {
      border-color: var(--tb-accent);
      color: var(--tb-accent);
      transform: translateY(-2px);
    }
    .tb-tab.active {
      background: linear-gradient(135deg, var(--tb-accent), var(--tb-accent2));
      color: #fff;
      border-color: transparent;
      box-shadow: 0 4px 15px rgba(73,177,245,0.3);
    }
    .tb-tab i { margin-right: 6px; }

    /* --- Grid --- */
    .tb-grid {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px 80px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
      position: relative; z-index: 1;
    }

    /* --- Card --- */
    .tb-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 22px;
      box-shadow: var(--shadow-card);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      display: block;
      color: inherit;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0;
      transform: translateY(25px) scale(0.97);
    }
    .tb-card.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .tb-card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 16px 40px rgba(0,0,0,0.12);
      border-color: var(--tb-accent);
    }
    .tb-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 4px;
      border-radius: 16px 16px 0 0;
      background: linear-gradient(90deg, var(--tb-accent), var(--tb-accent2));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
    }
    .tb-card:hover::before { transform: scaleX(1); }

    .tb-card::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
      transition: left 0.6s ease;
    }
    .tb-card:hover::after { left: 100%; }

    .tb-card-head {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 10px;
    }
    .tb-card-icon {
      width: 42px; height: 42px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; color: #fff;
      flex-shrink: 0;
      transition: transform 0.3s ease;
    }
    .tb-card:hover .tb-card-icon { transform: rotate(10deg) scale(1.1); }
    .tb-card-name {
      font-size: 1rem; font-weight: 700;
      color: var(--text-highlight-color);
      line-height: 1.3;
    }
    .tb-card-desc {
      font-size: 0.82rem;
      color: var(--font-color);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .tb-card-tag {
      display: inline-block;
      margin-top: 10px;
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #fff;
    }

    /* --- Empty State --- */
    .tb-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--dark-grey);
    }
    .tb-empty i { font-size: 3rem; margin-bottom: 16px; display: block; opacity: 0.3; }

    /* --- Back to top --- */
    .tb-back-top {
      position: fixed;
      bottom: 30px; right: 30px;
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--tb-accent), var(--tb-accent2));
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      box-shadow: 0 4px 15px rgba(73,177,245,0.3);
      cursor: pointer;
      opacity: 0; transform: translateY(20px);
      transition: all 0.3s ease;
      z-index: 100;
      border: none;
    }
    .tb-back-top.show { opacity: 1; transform: translateY(0); }
    .tb-back-top:hover { transform: translateY(-3px) scale(1.1); }

    /* --- Footer --- */
    #footer {
      background: var(--card-bg);
      border-top: 1px solid var(--border-color);
      padding: 24px 20px;
      text-align: center;
      color: var(--dark-grey);
      font-size: 0.85rem;
    }

    /* --- Responsive --- */
    @media (max-width: 768px) {
      .tb-hero h1 { font-size: 1.8rem; }
      .tb-grid { grid-template-columns: 1fr; }
      .tb-stats { gap: 12px; }
    }

    /* --- Reading Progress --- */
    #reading-progress {
      position: fixed; top: 0; left: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--tb-accent), var(--tb-accent2));
      z-index: 9999;
      transition: width 0.1s linear;
    }

    /* Category color map */
    .cat-tool    { background: linear-gradient(135deg, #49b1f5, #69c0ff); }
    .cat-ai      { background: linear-gradient(135deg, #a78bfa, #c4b5fd); }

    .cat-game    { background: linear-gradient(135deg, #ff7242, #ff9a6c); }
    .cat-search  { background: linear-gradient(135deg, #2196f3, #64b5f6); }
    .cat-social  { background: linear-gradient(135deg, #e91e63, #f48fb1); }
    .cat-vpn     { background: linear-gradient(135deg, #607d8b, #90a4ae); }
    .cat-media   { background: linear-gradient(135deg, #ff5722, #ff8a65); }
    .cat-other   { background: linear-gradient(135deg, #78909c, #b0bec5); }

    .tag-tool    { background: #49b1f5; }
    .tag-ai      { background: #a78bfa; }
    .tag-download{ background: #36d399; }
    .tag-github  { background: #555; }
    .tag-study   { background: #f9a825; }
    .tag-game    { background: #ff7242; }
    .tag-search  { background: #2196f3; }
    .tag-social  { background: #e91e63; }
    .tag-vpn     { background: #607d8b; }
    .tag-media   { background: #ff5722; }
    .tag-other   { background: #78909c; }

    [data-theme='dark'] .cat-github { background: linear-gradient(135deg, #888, #aaa); }
  </style>
</head>

      tool: "工具", ai: "AI", download: "下载", github: "GitHub",

    };

    // ===== Render =====
    const grid = document.getElementById('tbGrid');
    let currentCat = 'all';
    let searchQuery = '';

    function render() {
      const filtered = data.filter(b => {
        const catMatch = currentCat === 'all' || b.cat === currentCat;
        const q = searchQuery.toLowerCase();
        const searchMatch = !q || b.name.toLowerCase().includes(q) || b.desc.toLowerCase().includes(q) || catLabels[b.cat].includes(q);
        return catMatch && searchMatch;
      });

      if (filtered.length === 0) {
        grid.innerHTML = '<div class="tb-empty"><i class="fas fa-search"></i><p>没有找到匹配的网站</p></div>';
        return;
      }

      grid.innerHTML = filtered.map((b, i) => `
        <a class="tb-card" href="${b.url}" target="_blank" rel="noopener" style="transition-delay: ${i * 0.04}s">
          <div class="tb-card-head">
            <div class="tb-card-icon cat-${b.cat}"><i class="${b.icon}"></i></div>
            <div class="tb-card-name">${b.name}</div>
          </div>
          <div class="tb-card-desc">${b.desc}</div>
          <span class="tb-card-tag tag-${b.cat}">${catLabels[b.cat]}</span>
        </a>
      `).join('');

      // Trigger animation
      requestAnimationFrame(() => {
        document.querySelectorAll('.tb-card').forEach((card, i) => {
          setTimeout(() => card.classList.add('visible'), i * 50);
        });
      });
    }

    // ===== Tabs =====
    document.getElementById('tbTabs').addEventListener('click', e => {
      const tab = e.target.closest('.tb-tab');
      if (!tab) return;
      document.querySelectorAll('.tb-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentCat = tab.dataset.cat;
      render();
    });

    // ===== Search =====
    let searchTimeout;
    document.getElementById('tbSearch').addEventListener('input', e => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
